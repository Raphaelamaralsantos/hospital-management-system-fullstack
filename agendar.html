<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Consulta - Hospital</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">🏥 Hospital</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="agendar.html">Agendar</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero" style="min-height: 100vh; padding-top: 8rem;">
        <div class="container">
            <h1>Agendar Consulta</h1>
            <p>Preencha o formulário para marcar sua consulta</p>
            
            <form id="bookingForm" class="form-group">
                <input type="text" id="nome" placeholder="Nome Completo" required>
                <input type="email" id="email" placeholder="Email" required>
                <select id="especialidade" required>
                    <option value="">Especialidade</option>
                    <option value="cardiologia">Cardiologia</option>
                    <option value="dermatologia">Dermatologia</option>
                    <option value="ortopedia">Ortopedia</option>
                    <option value="pediatria">Pediatria</option>
                    <option value="clinica-geral">Clínica Geral</option>
                </select>
                <input type="date" id="data" required>
                <input type="time" id="hora" required>
                <textarea id="observacoes" placeholder="Observações (opcional)" rows="4"></textarea>
                <button type="submit" class="button" style="width: 100%;">Confirmar Agendamento</button>
            </form>

            <div id="confirmation" style="display: none; background: rgba(40,167,69,0.3); padding: 2rem; border-radius: 20px; margin-top: 2rem; text-align: center;">
                <h3>✅ Agendamento Confirmado!</h3>
                <p id="confDetails"></p>
                <a href="index.html" class="button">Voltar ao Home</a>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 Hospital Taguatinga. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        // Check login
        if (localStorage.getItem('loggedIn') !== 'true') {
            alert('Faça login primeiro!');
            window.location.href = 'login.html';
            return;
        }

        const bookingForm = document.getElementById('bookingForm');
        const confirmation = document.getElementById('confirmation');
        const confDetails = document.getElementById('confDetails');

        bookingForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                especialidade: document.getElementById('especialidade').value,
                data: document.getElementById('data').value,
                hora: document.getElementById('hora').value,
                observacoes: document.getElementById('observacoes').value
            };

            confDetails.innerHTML = `
                <strong>${formData.nome}</strong><br>
                ${formData.especialidade} - ${formData.data} às ${formData.hora}<br>
                Email: ${formData.email}
            `;

            bookingForm.style.display = 'none';
            confirmation.style.display = 'block';

            // Simulate save
            console.log('Agendamento salvo:', formData);
            localStorage.setItem('lastBooking', JSON.stringify(formData));
        });
    </script>
</body>
</html>
